<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="HandheldFriendly" content="true">
<meta name="MobileOptimized" content="width">
<title>Cafe Menu Order</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brown-dark: #1E3932;
    --brown-mid: #2D5A4E;
    --brown-warm: #00704A;
    --cream: #D4E9E2;
    --cream-light: #F1F8F5;
    --gold: #00704A;
    --gold-light: #00A862;
    --red-accent: #C0392B;
    --green: #1E3932;
    --text-dark: #1E3932;
    --text-mid: #2D5A4E;
    --shadow: rgba(30,57,50,0.15);
  }

  /* ── 브랜드 선택 화면 ── */
  .brand-screen {
    position: fixed;
    inset: 0;
    background: #1A1A1A;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(255,255,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(255,255,255,0.03) 0%, transparent 60%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    z-index: 3000;
    padding: 32px 20px 40px;
    overflow-y: auto;
  }
  .brand-screen.hidden { display: none; }
  .brand-screen-logo {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.5rem;
    color: rgba(255,255,255,0.9);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
    text-align: center;
  }
  .brand-screen-sub {
    color: rgba(255,255,255,0.4);
    font-size: 0.75rem;
    margin-bottom: 28px;
    font-weight: 300;
  }
  .brand-screen-label {
    color: rgba(255,255,255,0.6);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .brand-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 400px;
  }
  .brand-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px 8px;
    border-radius: 14px;
    border: 1.5px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    cursor: pointer;
    transition: all 0.18s ease;
    color: white;
    -webkit-tap-highlight-color: transparent;
    gap: 6px;
  }
  .brand-btn:hover, .brand-btn:active {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.3);
    transform: scale(1.03);
  }
  .brand-btn-emoji { font-size: 1.5rem; line-height: 1; }
  .brand-btn-name {
    font-size: 0.72rem;
    font-weight: 700;
    text-align: center;
    line-height: 1.3;
    color: rgba(255,255,255,0.85);
  }
  .brand-made {
    margin-top: 28px;
    color: rgba(255,255,255,0.15);
    font-size: 0.62rem;
    letter-spacing: 0.08em;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    background: var(--bg-color, #E8F3EE);
    min-height: 100vh;
    color: var(--text-dark);
  }

  header {
    background: var(--brown-dark);
    padding: 24px 32px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 20px,
      rgba(200,151,58,0.04) 20px,
      rgba(200,151,58,0.04) 40px
    );
  }
  header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 2rem;
    color: var(--gold-light);
    letter-spacing: 0.05em;
    position: relative;
  }
  header p {
    color: rgba(245,236,215,0.7);
    font-size: 0.85rem;
    margin-top: 6px;
    font-weight: 300;
    position: relative;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 16px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
    align-items: start;
  }

  /* ── ORDER PANEL ── */
  .order-panel {
    background: var(--cream-light);
    border-radius: 16px;
    box-shadow: 0 8px 32px var(--shadow);
    overflow: hidden;
  }

  .name-section {
    padding: 16px 14px;
    border-bottom: 1px solid rgba(139,94,60,0.15);
    background: var(--cream);
  }
  .name-section label {
    display: block;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--brown-warm);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .name-input {
    width: 100%;
    padding: 10px 12px;
    border: 2px solid rgba(139,94,60,0.25);
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.9rem;
    background: white;
    color: var(--text-dark);
    outline: none;
    transition: border-color 0.2s;
  }
  .name-input:focus { border-color: var(--gold); }

  /* category tabs */
  .category-tabs {
    display: flex;
    overflow-x: auto;
    background: var(--brown-dark);
    scrollbar-width: none;
  }
  .category-tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    padding: 10px 14px;
    border: none;
    background: transparent;
    color: rgba(245,236,215,0.55);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--cream); }
  .tab-btn.active {
    color: var(--gold-light);
    border-bottom-color: var(--gold-light);
    background: rgba(200,151,58,0.08);
  }

  /* menu grid */
  .menu-section { padding: 14px 12px; }
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .menu-card {
    border: 1.5px solid rgba(139,94,60,0.15);
    border-radius: 10px;
    padding: 10px 10px;
    background: white;
    cursor: pointer;
    transition: all 0.18s ease;
    position: relative;
    overflow: hidden;
  }
  .menu-card:hover {
    border-color: var(--gold);
    box-shadow: 0 4px 14px rgba(200,151,58,0.2);
    transform: translateY(-1px);
  }
  .menu-card.selected {
    border-color: var(--gold);
    background: #FFF8EC;
    box-shadow: 0 0 0 3px rgba(200,151,58,0.18);
  }
  .menu-name {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--brown-dark);
    line-height: 1.3;
    margin-bottom: 3px;
  }
  .menu-price {
    font-size: 0.75rem;
    color: var(--brown-warm);
    font-weight: 500;
  }
  .menu-badge {
    position: absolute;
    top: 8px; right: 8px;
    background: var(--gold);
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transform: scale(0.7);
    transition: all 0.18s ease;
  }
  .menu-card.selected .menu-badge { opacity: 1; transform: scale(1); }

  /* temp tag */
  .temp-tags {
    display: flex;
    gap: 4px;
    margin-bottom: 6px;
  }
  .temp-tag {
    font-size: 0.65rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }
  .temp-tag.ice {
    background: #E8F4FD;
    color: #1A6FA8;
    border: 1px solid #BADFF5;
  }
  .temp-tag.hot {
    background: #FEF5E7;
    color: #B7600A;
    border: 1px solid #F9D8A0;
  }

  /* temp selector */
  .temp-selector {
    display: none;
    gap: 6px;
    margin-top: 10px;
  }
  .menu-card.selected .temp-selector { display: flex; }
  .temp-sel-btn {
    flex: 1;
    padding: 5px 0;
    border-radius: 6px;
    border: 1.5px solid #ddd;
    background: white;
    font-size: 0.72rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .temp-sel-btn.ice { border-color: #BADFF5; color: #1A6FA8; }
  .temp-sel-btn.ice.active { background: #1A6FA8; color: white; border-color: #1A6FA8; }
  .temp-sel-btn.hot { border-color: #F5C4BB; color: #C0392B; }
  .temp-sel-btn.hot.active { background: #C0392B; color: white; border-color: #C0392B; }
  .qty-control {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    opacity: 0;
    height: 0;
    overflow: hidden;
    transition: all 0.2s;
  }
  .menu-card.selected .qty-control { opacity: 1; height: 32px; }
  .qty-btn {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--gold);
    background: white;
    color: var(--brown-warm);
    font-size: 0.9rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    transition: all 0.15s;
    line-height: 1;
  }
  .qty-btn:hover { background: var(--gold); color: white; }
  .qty-display {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--brown-dark);
    min-width: 18px;
    text-align: center;
  }

  /* submit button */
  .submit-section { padding: 0 12px 16px; }
  .submit-btn {
    width: 100%;
    padding: 12px;
    background: var(--brown-dark);
    color: var(--gold-light);
    border: none;
    border-radius: 10px;
    font-family: 'Noto Serif KR', serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .submit-btn:hover { background: var(--brown-mid); transform: translateY(-1px); box-shadow: 0 6px 18px var(--shadow); }
  .submit-btn:active { transform: translateY(0); }

  /* ── SUMMARY PANEL ── */
  .summary-panel {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .summary-card {
    background: var(--cream-light);
    border-radius: 16px;
    box-shadow: 0 8px 32px var(--shadow);
    overflow: hidden;
  }
  .card-header {
    padding: 12px 16px;
    background: var(--brown-mid);
    color: var(--cream);
    font-family: 'Noto Serif KR', serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-header .icon { font-size: 0.9rem; }

  /* total cost */
  .total-display {
    padding: 16px 16px;
    text-align: center;
  }
  .total-amount {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--brown-dark);
    letter-spacing: -0.02em;
  }
  .total-label { font-size: 0.72rem; color: var(--brown-warm); font-weight: 500; margin-top: 4px; }
  .total-count { font-size: 0.75rem; color: var(--brown-warm); margin-top: 6px; }

  /* drink summary */
  .drink-list { padding: 4px 0; }
  .drink-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    border-bottom: 1px solid rgba(139,94,60,0.08);
    transition: background 0.15s;
  }
  .drink-row:last-child { border-bottom: none; }
  .drink-row:hover { background: rgba(200,151,58,0.05); }
  .drink-row-name { font-size: 0.78rem; font-weight: 500; color: var(--text-dark); }
  .drink-row-count {
    background: var(--brown-dark);
    color: var(--gold-light);
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .drink-row-price { font-size: 0.72rem; color: var(--brown-warm); margin-left: 6px; }

  /* people list */
  .people-list { padding: 8px 0; max-height: 320px; overflow-y: auto; }
  .people-list::-webkit-scrollbar { width: 4px; }
  .people-list::-webkit-scrollbar-track { background: transparent; }
  .people-list::-webkit-scrollbar-thumb { background: var(--brown-warm); border-radius: 2px; opacity: 0.4; }

  .person-row {
    padding: 10px 22px;
    border-bottom: 1px solid rgba(139,94,60,0.08);
    animation: slideIn 0.3s ease;
  }
  .person-row:last-child { border-bottom: none; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .person-name {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--brown-dark);
    margin-bottom: 3px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .person-subtotal { font-size: 0.72rem; color: var(--brown-warm); }
  .person-items { font-size: 0.72rem; color: var(--text-mid); line-height: 1.6; }
  .delete-person {
    background: none;
    border: none;
    color: rgba(192,57,43,0.5);
    cursor: pointer;
    font-size: 0.72rem;
    padding: 2px 5px;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .delete-person:hover { color: var(--red-accent); background: rgba(192,57,43,0.08); }

  .empty-state {
    padding: 20px 16px;
    text-align: center;
    color: rgba(139,94,60,0.5);
    font-size: 0.78rem;
  }

  /* export btn */
  .export-btn {
    width: calc(100% - 28px);
    margin: 0 14px 12px;
    padding: 10px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .export-btn:hover { filter: brightness(1.1); }

  /* toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--brown-dark);
    color: var(--gold-light);
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 0.88rem;
    font-weight: 500;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* reset btn */
  .reset-btn {
    width: calc(100% - 28px);
    margin: 0 14px 14px;
    padding: 10px;
    background: transparent;
    color: var(--red-accent);
    border: 1.5px solid var(--red-accent);
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .reset-btn:hover { background: rgba(192,57,43,0.05); }
  .reset-btn-progress {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0%;
    background: rgba(192,57,43,0.15);
    transition: width linear;
    pointer-events: none;
  }

  /* ── ICE/HOT 모달 ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: var(--cream-light);
    border-radius: 20px 20px 0 0;
    padding: 28px 24px 40px;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--brown-dark);
    margin-bottom: 6px;
  }
  .modal-price {
    font-size: 0.85rem;
    color: var(--brown-warm);
    margin-bottom: 24px;
  }
  .modal-temp-row {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
  }
  .modal-temp-block {
    flex: 1;
    background: white;
    border-radius: 14px;
    padding: 18px 12px;
    border: 2px solid #eee;
    text-align: center;
  }
  .modal-temp-block.ice { border-color: #BADFF5; }
  .modal-temp-block.hot { border-color: #F5C4BB; }
  .modal-temp-label {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 14px;
  }
  .modal-temp-label.ice { color: #1A6FA8; }
  .modal-temp-label.hot { color: #C0392B; }
  .modal-qty-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
  }
  .modal-qty-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    background: white;
    color: var(--brown-warm);
    font-size: 1.4rem;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .modal-qty-btn:active { background: var(--gold); color: white; }
  .modal-qty-num {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--brown-dark);
    min-width: 32px;
    text-align: center;
  }
  .modal-confirm-btn {
    width: 100%;
    padding: 16px;
    background: var(--brown-dark);
    color: var(--gold-light);
    border: none;
    border-radius: 12px;
    font-family: 'Noto Serif KR', serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .modal-cancel-btn {
    width: 100%;
    padding: 12px;
    background: transparent;
    color: var(--brown-warm);
    border: none;
    font-size: 0.85rem;
    cursor: pointer;
    margin-top: 10px;
    -webkit-tap-highlight-color: transparent;
  }

  /* 넓은 화면에서만 2단 레이아웃 */
  @media (min-width: 761px) {
    .container { grid-template-columns: 1fr 380px; padding: 32px 20px; gap: 28px; }
    .menu-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .menu-section { padding: 24px 28px; }
    .name-section { padding: 24px 28px; }
    .submit-section { padding: 0 28px 28px; }
    .menu-card { padding: 14px 16px; }
    .tab-btn { padding: 14px 22px; font-size: 0.85rem; }
    .card-header { padding: 16px 22px; font-size: 0.95rem; }
    .total-amount { font-size: 2.4rem; }
    .drink-row { padding: 10px 22px; }
    .person-row { padding: 10px 22px; }
    .export-btn { width: calc(100% - 44px); margin: 0 22px 20px; }
    .reset-btn { width: calc(100% - 44px); margin: 0 22px 20px; }
    .menu-name { font-size: 0.88rem; }
    .menu-price { font-size: 0.78rem; }
    .name-section label { font-size: 0.78rem; }
    .name-input { font-size: 1rem; padding: 12px 16px; }
    .drink-row-name { font-size: 0.85rem; }
    .drink-row-count { font-size: 0.75rem; }
    .drink-row-price { font-size: 0.78rem; }
    .person-name { font-size: 0.85rem; }
    .person-subtotal { font-size: 0.75rem; }
    .person-items { font-size: 0.78rem; }
    .delete-person { font-size: 0.75rem; }
    .empty-state { font-size: 0.85rem; }
    .total-label { font-size: 0.78rem; }
    .total-count { font-size: 0.85rem; }
    .submit-btn { font-size: 1rem; }
    .temp-tag { font-size: 0.65rem; }
    .qty-btn { width: 28px; height: 28px; font-size: 1rem; }
    .qty-display { font-size: 0.95rem; }
  }

  /* 모바일 클래스 기반 스타일 (JS 감지 보조) */
  body.mobile { font-size: 12px; }
  body.mobile .container { grid-template-columns: 1fr !important; padding: 16px 12px !important; gap: 16px !important; }

  /* ── 그룹명 입력 화면 ── */
  .group-screen {
    position: fixed;
    inset: 0;
    background: #1E3932;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(0,168,98,0.2) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(0,112,74,0.25) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(0,60,30,0.3) 0%, transparent 50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    padding: 32px 24px;
  }
  .group-screen.hidden { display: none; }
  .group-screen-logo {
    font-family: 'Noto Serif KR', serif;

</div>

    onkeydown="if(event.key==='Enter') startWithGroup()">

  <button class="group-screen-btn" onclick="startWithGroup()">시작하기 →</button>
</div>

<header>
  <h1 id="headerTitle">☕ Menu Order <span class="group-badge" id="groupBadge"></span></h1>
  <p>음료를 선택하고 이름을 입력한 후 신청하세요</p>
</header>

<div class="container">
  <!-- ORDER PANEL -->
  <div class="order-panel">
    <div class="name-section">
      <label>신청자 이름</label>
      <input class="name-input" id="nameInput" type="text" placeholder="이름을 입력하세요" maxlength="20">
    </div>

    <div class="category-tabs" id="categoryTabs"></div>
    <div class="menu-section">
      <div class="menu-grid" id="menuGrid"></div>
    </div>
    <div class="submit-section">
      <button class="submit-btn" onclick="submitOrder()">신청하기</button>
    </div>
  </div>

  <!-- SUMMARY PANEL -->
  <div class="summary-panel">
    <!-- total cost -->
    <div class="summary-card">
      <div class="card-header"><span class="icon">💰</span> 총 비용</div>
      <div class="total-display">
        <div class="total-amount" id="totalCost">₩0</div>
        <div class="total-label">전체 신청 합계</div>
        <div class="total-count" id="totalCount">총 0명 · 0잔</div>
      </div>
    </div>

    <!-- drink summary -->
    <div class="summary-card">
      <div class="card-header"><span class="icon">📊</span> 음료별 수량</div>
      <div class="drink-list" id="drinkSummary">
        <div class="empty-state">아직 신청된 음료가 없습니다</div>
      </div>
    </div>

    <!-- people list -->
    <div class="summary-card">
      <div class="card-header"><span class="icon">👥</span> 신청자 목록 <span id="peopleCount" style="margin-left:auto;font-size:0.82rem;font-weight:400;opacity:0.85;">총 0명</span></div>

      </div>
      <button class="export-btn" onclick="exportCSV()">📥 엑셀(CSV)로 내보내기</button>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ICE/HOT 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">

</div>

// ── Firebase 기본 URL ──
const FIREBASE_BASE = 'https://universal-ion-493504-s3-default-rtdb.firebaseio.com';
let FIREBASE_URL = '';

// ── 브랜드 선택 화면 초기화 ──
function initBrandScreen() {
  const grid = document.getElementById('brandGrid');
  Object.entries(BRANDS).forEach(([name, brand]) => {
    const btn = document.createElement('button');
    btn.className = 'brand-btn';
    btn.innerHTML = `<span class="brand-btn-emoji">${brand.emoji}</span><span class="brand-btn-name">${name}</span>`;
    btn.onclick = () => selectBrand(name);
    grid.appendChild(btn);
  });
}

function selectBrand(name) {
  currentBrand = name;
  const brand = BRANDS[name];
  MENU = brand.menu;

  // CSS 변수 동적 적용
  const r = document.documentElement.style;
  r.setProperty('--brown-dark', brand.colors.dark);
  r.setProperty('--brown-mid', brand.colors.mid);
  r.setProperty('--brown-warm', brand.colors.warm);
  r.setProperty('--cream', brand.colors.cream);
  r.setProperty('--cream-light', brand.colors.creamLight);
  r.setProperty('--gold', brand.colors.gold);
  r.setProperty('--gold-light', brand.colors.goldLight);
  r.setProperty('--text-dark', brand.colors.dark);
  r.setProperty('--text-mid', brand.colors.mid);
  r.setProperty('--shadow', brand.colors.shadow);
  r.setProperty('--green', brand.colors.dark);
  document.body.style.background = brand.colors.bg;

  // 그룹 화면 로고 업데이트
  document.getElementById('groupScreenLogo').innerHTML =
    `${brand.emoji} <span style="opacity:0.9">${name}</span> <span style="color:${brand.colors.accent}">●</span> Menu Order`;
  document.querySelector('.group-screen-btn').style.background =
    `linear-gradient(135deg, ${brand.colors.gold} 60%, ${brand.colors.accent} 100%)`;
  document.querySelector('.group-screen').style.background = brand.colors.dark;

  // 헤더 업데이트
  document.getElementById('headerTitle').innerHTML =
    `${brand.emoji} ${name} <span style="color:${brand.colors.accent}">●</span> Menu Order <span class="group-badge" id="groupBadge"></span>`;

  document.getElementById('brandScreen').classList.add('hidden');
  document.getElementById('groupScreen').classList.remove('hidden');
  document.getElementById('groupInput').focus();
}

// ── 그룹명 시작 ──
function startWithGroup() {
  const group = document.getElementById('groupInput').value.trim();
  if (!group) {
    document.getElementById('groupInput').focus();
    document.getElementById('groupInput').style.borderColor = '#C0392B';
    return;
  }
  currentGroup = group;
  FIREBASE_URL = `${FIREBASE_BASE}/orders/${encodeURIComponent(currentBrand)}/${encodeURIComponent(group)}`;
  document.getElementById('groupScreen').classList.add('hidden');
  document.getElementById('groupBadge').textContent = group;
  init();
}

function init() {
  currentCategory = Object.keys(MENU)[0];
  const tabs = document.getElementById('categoryTabs');
  tabs.innerHTML = '';
  Object.keys(MENU).forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => switchCategory(cat);
    tabs.appendChild(btn);
  });
  renderMenu();
  loadOrdersFromServer();
}

// ── 서버에서 주문 불러오기 ──
async function loadOrdersFromServer() {
  showToast('📡 주문 내역 불러오는 중...');
  try {
    const res = await fetch(`${FIREBASE_URL}.json`);
    const data = await res.json();
    orders = data ? Object.entries(data).map(([id, o]) => ({ ...o, _id: id })) : [];
    updateSummary();
    showToast('✔ 주문 내역을 불러왔습니다');
  } catch (err) {
    showToast('⚠ 불러오기 실패: ' + err.message);
  }
}

function switchCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === cat);
  });
  renderMenu();
}

function renderMenu() {
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = '';
  MENU[currentCategory].forEach(item => {
    // 이 메뉴에 선택된 temp별 수량
    const iceKey = `${item.name}|ice`;
    const hotKey = `${item.name}|hot`;
    const iceQty = selectedItems[iceKey] || 0;
    const hotQty = selectedItems[hotKey] || 0;
    const totalQty = iceQty + hotQty;
    const isOpen = !!selectedItems[`${item.name}|_open`];
    const onlyIce = item.temp.length === 1 && item.temp[0] === 'ice';
    const onlyHot = item.temp.length === 1 && item.temp[0] === 'hot';
    const both = item.temp.includes('ice') && item.temp.includes('hot');

    const card = document.createElement('div');
    card.className = 'menu-card' + (totalQty > 0 || isOpen ? ' selected' : '');

    let tempSelHtml = '';
    if (both) {
      // 카드에는 선택된 수량만 표시, 클릭 시 모달 오픈
      tempSelHtml = (totalQty > 0) ? `
        <div class="qty-control" style="opacity:1;height:auto;overflow:visible;margin-top:8px;">
          <span style="font-size:0.7rem;color:#1A6FA8;font-weight:700;">${iceQty > 0 ? `❄${iceQty}` : ''}</span>
          <span style="font-size:0.7rem;color:#C0392B;font-weight:700;margin-left:4px;">${hotQty > 0 ? `☕${hotQty}` : ''}</span>
        </div>` : '';
    } else {
      const t = onlyIce ? 'ice' : 'hot';
      const qty = onlyIce ? iceQty : hotQty;
      tempSelHtml = `
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty(event,'${item.name}','${t}',-1)">−</button>
          <span class="qty-display">${qty}</span>
          <button class="qty-btn" onclick="changeQty(event,'${item.name}','${t}',1)">+</button>
        </div>`;
    }

    card.innerHTML = `
      <div class="menu-badge">${totalQty}</div>
      <div class="temp-tags">
        ${item.temp.includes('ice') ? '<span class="temp-tag ice">❄ ICE</span>' : ''}
        ${item.temp.includes('hot') ? '<span class="temp-tag hot">☕ HOT</span>' : ''}
      </div>
      <div class="menu-name">${item.name}</div>
      <div class="menu-price">₩${item.price.toLocaleString()}</div>
      ${tempSelHtml}
    `;
    card.onclick = (e) => {
      if (e.target.closest('.qty-btn')) return;
      if (both) {
        openModal(item);
      } else {
        const t = onlyIce ? 'ice' : 'hot';
        const key = `${item.name}|${t}`;
        if (!selectedItems[key]) { selectedItems[key] = 1; }
        else { delete selectedItems[key]; }
        renderMenu();
      }
    };
    grid.appendChild(card);
  });
}

// ── 모달 ──
let modalItem = null;
let modalIce = 0, modalHot = 0;

function openModal(item) {
  modalItem = item;
  modalIce = selectedItems[`${item.name}|ice`] || 0;
  modalHot = selectedItems[`${item.name}|hot`] || 0;
  document.getElementById('modalItemName').textContent = item.name;
  document.getElementById('modalItemPrice').textContent = `₩${item.price.toLocaleString()} / 잔`;
  document.getElementById('modalIceQty').textContent = modalIce;
  document.getElementById('modalHotQty').textContent = modalHot;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('show');
  modalItem = null;
}

function modalChangeQty(e, temp, delta) {
  e.preventDefault();
  e.stopPropagation();
  if (temp === 'ice') {
    modalIce = Math.max(0, modalIce + delta);
    document.getElementById('modalIceQty').textContent = modalIce;
  } else {
    modalHot = Math.max(0, modalHot + delta);
    document.getElementById('modalHotQty').textContent = modalHot;
  }
}

function confirmModal() {
  if (!modalItem) return;
  const iceKey = `${modalItem.name}|ice`;
  const hotKey = `${modalItem.name}|hot`;
  const openKey = `${modalItem.name}|_open`;
  if (modalIce > 0) selectedItems[iceKey] = modalIce; else delete selectedItems[iceKey];
  if (modalHot > 0) selectedItems[hotKey] = modalHot; else delete selectedItems[hotKey];
  delete selectedItems[openKey];
  closeModalDirect();
  renderMenu();
}

function changeQty(e, name, temp, delta) {
  e.stopPropagation();
  const key = `${name}|${temp}`;
  const current = selectedItems[key] || 0;
  const next = current + delta;
  if (next <= 0) { delete selectedItems[key]; }
  else { selectedItems[key] = next; }
  renderMenu();
}

async function submitOrder() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { showToast('⚠ 이름을 입력해주세요'); return; }

  const allMenuFlat = Object.values(MENU).flat();
  const items = Object.entries(selectedItems)
    .filter(([key, qty]) => !key.endsWith('|_open') && qty > 0)
    .map(([key, qty]) => {
      const [mname, temp] = key.split('|');
      const info = allMenuFlat.find(m => m.name === mname);
      return { name: mname, temp, price: info.price, qty };
    });

  if (items.length === 0) { showToast('⚠ 음료를 하나 이상 선택해주세요'); return; }

  const order = { name, items, timestamp: new Date().toLocaleString('ko-KR') };
  showToast('📡 저장 중...');
  document.querySelector('.submit-btn').disabled = true;

  try {
    const res = await fetch(`${FIREBASE_URL}.json`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(order)
    });
    const data = await res.json();
    order._id = data.name;
    orders.push(order);
    selectedItems = {};
    document.getElementById('nameInput').value = '';
    document.querySelector('.submit-btn').disabled = false;
    renderMenu();
    updateSummary();
    showToast(`✔ ${name}님의 주문이 등록되었습니다`);
  } catch (err) {
    document.querySelector('.submit-btn').disabled = false;
    showToast('⚠ 저장 실패: ' + err.message);
  }
}

// ── SUMMARY ──
function updateSummary() {
  // total
  let totalCost = 0, totalCups = 0, totalPeople = orders.length;
  orders.forEach(o => o.items.forEach(i => { totalCost += i.price * i.qty; totalCups += i.qty; }));

  document.getElementById('totalCost').textContent = `₩${totalCost.toLocaleString()}`;
  document.getElementById('totalCount').textContent = `총 ${totalPeople}명 · ${totalCups}잔`;

  // drink summary
  const drinkMap = {};
  orders.forEach(o => o.items.forEach(i => {
    const key = `${i.name} (${i.temp === 'ice' ? '❄ ICE' : '☕ HOT'})`;
    if (!drinkMap[key]) drinkMap[key] = { qty: 0, price: i.price };
    drinkMap[key].qty += i.qty;
  }));

  const drinkEl = document.getElementById('drinkSummary');
  const sorted = Object.entries(drinkMap).sort((a,b) => b[1].qty - a[1].qty);
  if (sorted.length === 0) {
    drinkEl.innerHTML = '<div class="empty-state">아직 신청된 음료가 없습니다</div>';
  } else {
    drinkEl.innerHTML = sorted.map(([name, d]) => `
      <div class="drink-row">
        <span class="drink-row-name">${name}</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="drink-row-price">₩${(d.price * d.qty).toLocaleString()}</span>
          <span class="drink-row-count">${d.qty}잔</span>
        </div>
      </div>
    `).join('');
  }

  // people count
  document.getElementById('peopleCount').textContent = `총 ${orders.length}명`;

  // people list
  const peopleEl = document.getElementById('peopleList');
  if (orders.length === 0) {
    peopleEl.innerHTML = '<div class="empty-state">아직 신청자가 없습니다</div>';
  } else {
    peopleEl.innerHTML = orders.map((o, idx) => {
      const sub = o.items.reduce((s,i) => s + i.price * i.qty, 0);
      const itemStr = o.items.map(i => `${i.name}(${i.temp === 'ice' ? 'ICE' : 'HOT'}) ×${i.qty}`).join(' / ');
      return `
        <div class="person-row">
          <div class="person-name">
            <span>👤 ${o.name}</span>
            <div style="display:flex;align-items:center;gap:6px">
              <span class="person-subtotal">₩${sub.toLocaleString()}</span>
              <button class="delete-person" onclick="deleteOrder(${idx})">✕</button>
            </div>
          </div>
          <div class="person-items">${itemStr}</div>
        </div>
      `;
    }).join('');
  }
}

async function deleteOrder(idx) {
  const o = orders[idx];
  if (!confirm(`${o.name}님의 주문을 삭제하시겠습니까?`)) return;
  showToast('📡 삭제 중...');
  try {
    await fetch(`${FIREBASE_URL}/${o._id}.json`, { method: 'DELETE' });
    orders.splice(idx, 1);
    updateSummary();
    showToast(`${o.name}님의 주문이 삭제되었습니다`);
  } catch (err) {
    showToast('⚠ 삭제 실패: ' + err.message);
  }
}

let resetTimer = null;
let resetStartTime = null;
const RESET_DURATION = 3000;

function startReset(e) {
  if (e) e.preventDefault();
  if (orders.length === 0) { showToast('신청 내역이 없습니다'); return; }
  resetStartTime = Date.now();
  const progress = document.getElementById('resetProgress');
  progress.style.transition = `width ${RESET_DURATION}ms linear`;
  progress.style.width = '100%';
  document.getElementById('resetBtnText').textContent = '🗑 누르는 중...';
  resetTimer = setTimeout(() => {
    cancelReset();
    if (confirm('⚠ 전체 신청 내역을 초기화하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) {
      doReset();
    }
  }, RESET_DURATION);
}

function cancelReset() {
  if (resetTimer) {
    clearTimeout(resetTimer);
    resetTimer = null;
  }
  const progress = document.getElementById('resetProgress');
  progress.style.transition = 'width 0.2s ease';
  progress.style.width = '0%';
  document.getElementById('resetBtnText').textContent = '🗑 전체 초기화 (3초 길게 누르기)';
}

async function doReset() {
  showToast('📡 초기화 중...');
  try {
    await fetch(`${FIREBASE_URL}.json`, { method: 'DELETE' });
    orders = [];
    selectedItems = {};
    document.getElementById('nameInput').value = '';
    renderMenu();
    updateSummary();
    showToast('전체 초기화 완료');
  } catch (err) {
    showToast('⚠ 초기화 실패: ' + err.message);
  }
}

async function resetAll() {
  if (orders.length === 0) { showToast('신청 내역이 없습니다'); return; }
  if (!confirm('전체 신청 내역을 초기화하시겠습니까?')) return;
  showToast('📡 초기화 중...');
  try {
    await fetch(`${FIREBASE_URL}.json`, { method: 'DELETE' });
    orders = [];
    selectedItems = {};
    document.getElementById('nameInput').value = '';
    renderMenu();
    updateSummary();
    showToast('전체 초기화 완료');
  } catch (err) {
    showToast('⚠ 초기화 실패: ' + err.message);
  }
}

// ── EXPORT ──
function exportCSV() {
  if (orders.length === 0) { showToast('내보낼 내역이 없습니다'); return; }
  const allMenuFlat = Object.values(MENU).flat();
  const allDrinks = [...new Set(orders.flatMap(o => o.items.map(i => `${i.name}(${i.temp === 'ice' ? 'ICE' : 'HOT'})`)))];

  let rows = [['이름', ...allDrinks, '소계(원)']];
  orders.forEach(o => {
    const qtyMap = {};
    o.items.forEach(i => qtyMap[`${i.name}(${i.temp === 'ice' ? 'ICE' : 'HOT'})`] = i.qty);
    const sub = o.items.reduce((s,i) => s + i.price * i.qty, 0);
    rows.push([o.name, ...allDrinks.map(d => qtyMap[d] || ''), sub]);
  });
  // total row
  const totals = allDrinks.map(d => orders.reduce((s,o) => {
    const item = o.items.find(i => `${i.name}(${i.temp === 'ice' ? 'ICE' : 'HOT'})` === d);
    return s + (item ? item.qty : 0);
  }, 0));
  const grandTotal = orders.reduce((s,o) => s + o.items.reduce((a,i) => a + i.price*i.qty, 0), 0);
  rows.push(['합계', ...totals, grandTotal]);

  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const bom = '\uFEFF';
  const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const now = new Date();
  a.download = `할리스주문_${now.getMonth()+1}월${now.getDate()}일.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV 파일이 저장되었습니다');
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// 기기 실제 화면 기준으로 모바일 레이아웃 적용
function applyMobileLayout() {
  var isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  var w = screen.width || window.innerWidth || document.documentElement.clientWidth;
  if (isTouchDevice || w <= 760) {
    document.body.classList.add('mobile');
  } else {
    document.body.classList.remove('mobile');
  }
}
applyMobileLayout();
window.addEventListener('resize', applyMobileLayout);

// 브랜드 선택 화면 초기화
window.addEventListener('load', () => {
  initBrandScreen();
});
